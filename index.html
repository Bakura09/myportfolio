<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Page</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="dark">
    <!-- Nav bar on top -->

    <nav>
      <div class="nav-items">
        <span><a href="#home" class="item-link">Home</a></span>
        <span><a href="#about" class="item-link">About</a></span>
        <span><a href="#recent-work" class="item-link">Recent Work</a></span>
        <span
          ><a
            href="http://127.0.0.1:5500/pages/contact-us.html"
            target="_blank"
            class="item-link"
            >Get in Touch</a
          >
        </span>
      </div>
      <div class="social-icons">
        <div class="icons">
          <a
            href="https://www.linkedin.com/in/muayad-alsawalhi-229119123/"
            target="_blank"
            class="icon-link"
          >
            <i class="bi bi-linkedin"></i>
          </a>
          <a
            href="https://github.com/Bakura09?tab=repositories"
            class="icon-link"
          >
            <i class="bi bi-github"></i>
          </a>
          <a href="#" class="icon-link">
            <i class="bi bi-discord"></i>
          </a>
          <a href="#" class="icon-link">
            <i class="bi bi-behance"></i>
          </a>
        </div>
        <div class="theme">
          <button class="btn" onclick="toggleTheme()">
            <i
              class="bi bi-moon-stars-fill"
              role="button"
              id="toggle-theme"
            ></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Interactive text section -->

    <section class="interactive-text">
      <h2 class="changing-text-heading">
        I Build <span class="changing-text"></span>
      </h2>
    </section>

    <!-- Main section introduction -->
    <main class="profile-hero">
      <div class="introduction">
        <h1>Muayad Alsawalhi</h1>
        <p class="intro-text">
          Frontend-focused developer learning to turn ideas into fast,
          user-friendly web experiences using HTML, CSS, JavaScript, and modern
          tools.
        </p>

        <a
          href="http://127.0.0.1:5500/pages/contact-us.html"
          target="_blank"
          rel="noopener noreferrer"
          class="get-started"
        >
          <button type="button" class="btn get-started">
            Let's get started <i class="bi bi-caret-right"></i>
          </button>
        </a>
      </div>

      <div class="profile-picture">
        <img src="/assests/images/IMG_1724.JPG" alt="" />
      </div>
    </main>

    <!-- Experience section -->

    <!-- Footer section  -->
    <footer>
      <p>Made with 🧡 in Dubai</p>
    </footer>

    <!-- Js Scripts -->

    <script src="/assests/scripts/dark-light-mode.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
      var typed = new Typed(".changing-text", {
        strings: [
          "interactive user interfaces",
          "responsive web experiences",
          "accessible front-ends",
          "performant UI systems",
        ],
        typeSpeed: 70,
        backDelay: 700,
        loop: true,
        loopCount: Infinity,
      });
    </script>
  </body>
</html>
