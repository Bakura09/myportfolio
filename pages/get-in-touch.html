<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muayad SA | Get in Touch</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS file -->
    <link rel="stylesheet" href="/assests/css/contact-us.css" />
  </head>

  <body data-theme="dark">
    <!-- Navigation Bar -->
    <nav>
      <div class="nav-items">
        <span><a href="#home" class="item-link">Home</a></span>
        <span><a href="#about" class="item-link">About</a></span>
        <span><a href="#recent-work" class="item-link">Recent Work</a></span>
        <span
          ><a
            href="http://127.0.0.1:5500/pages/contact-us.html"
            target="_blank"
            class="item-link"
            >Get in Touch</a
          >
        </span>
      </div>
      <div class="social-icons">
        <div class="icons">
          <a
            href="https://www.linkedin.com/in/muayad-alsawalhi-229119123/"
            target="_blank"
            class="icon-link"
          >
            <i class="bi bi-linkedin"></i>
          </a>
          <a
            href="https://github.com/Bakura09?tab=repositories"
            class="icon-link"
          >
            <i class="bi bi-github"></i>
          </a>
          <a href="#" class="icon-link">
            <i class="bi bi-discord"></i>
          </a>
          <a href="#" class="icon-link">
            <i class="bi bi-behance"></i>
          </a>
        </div>
        <div class="theme">
          <i
            onclick="toggleTheme()"
            class="bi bi-moon-stars-fill btn"
            role="button"
            id="themeToggle"
            tabindex="0"
            aria-label="Toggle dark mode"
          ></i>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <main>
      <form action="submission.html" method="POST">
        <h1>Submit a Job Request</h1>

        <p>Please fill the information below:</p>

        <label for="name">Name</label>
        <input type="text" name="name" id="name" class="form-control" />

        <label for="email">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="name@example.com"
          class="form-control"
        />

        <label for="budget">Budget</label>
        <select name="budget" id="budget" class="form-control">
          <option value="$500">&lt;$500</option>
          <option value="$500">&lt;$1000</option>
          <option value="$500">&lt;$5000</option>
        </select>

        <label for="message">Message</label>
        <textarea
          name="message"
          id="message"
          placeholder="Write your request details"
          rows="5"
          cols="30"
          class="form-control"
        ></textarea>

        <input type="submit" value="Submit" />
      </form>
    </main>

    <!-- Footer section -->
    <footer>
      <p>Made with 🧡 in Dubai</p>
    </footer>
  </body>
</html>
