<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lets Word Together</title>

    <!-- Bootstrap styling sheet -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assests/css/contact-us.css" />
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <main
      class="container d-flex flex-column justify-content-center align-items-center"
    >
      <h1 class="mb-5">Lets Work Together</h1>

      <form action="submission.html" class="w-50 p-4">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input
            class="form-control"
            type="text"
            id="name"
            placeholder="name@example.com"
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="name@example.com"
          />
        </div>

        <div class="mb-3">
          <label for="budget">Budget</label>
          <select
            name="budget"
            id="budget"
            class="form-select"
            aria-label="Default select Example"
          >
            <option selected>Open this select menu</option>
            <option value="500">&lt;$500</option>
            <option value="1000">&lt;$1000</option>
            <option value="5000">&lt;$5000</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="3"></textarea>
        </div>
        <input type="button" value="Submit" class="btn btn-outline-success" />
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
